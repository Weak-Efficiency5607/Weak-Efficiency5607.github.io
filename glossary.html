<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4021/4021693.png">
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
		rel="stylesheet">
	<title>Dictionary</title>
<script src="js/theme.js"></script>
</head>

<body>
	<main class="container">
		<header class="site-header">
			<h1 class="logo"><a href="index.html">Anhedonia Resource Hub</a></h1>
			<p class="subtitle">Dictionary</p>
		</header>
		<section class="card allow-overflow">
			<h2>Medical & Pharmacological Dictionary</h2>
			<p style="color: var(--text-secondary); margin-bottom: 2rem; max-width: 800px;">
				A comprehensive reference of clinical abbreviations, neuroreceptor mechanisms, and physiological
				classifications relevant to anhedonia research.
			</p>

			<div class="search-container" style="margin-bottom: 3rem;">
				<input type="text" id="glossary-search"
					placeholder="Filter terms or definitions (e.g., 'Dopamine', 'SRI')..." autocomplete="off">
			</div>

			<div class="glossary-grid" id="glossary-items">
			</div>

			<h2 style="margin-top: 4rem; margin-bottom: 2rem;">Scientific Terms & Classifications</h2>
			<div class="glossary-tags" id="glossary-tags">
			</div>
		</section>
		
	</main>

	<script src="js/router.js"></script>
		<script src="js/glossary.js"></script>
</body>

</html>
