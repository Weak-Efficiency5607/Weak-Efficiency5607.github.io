<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4021/4021693.png">
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
		rel="stylesheet">
	<title>Treatments</title>
<script src="js/theme.js"></script>
</head>

<body>
	<main class="container">
		<header class="site-header">
			<h1 class="logo"><a href="https://www.reddit.com/r/anhedonia/">Anhedonia Resource Hub</a></h1>
			<p class="subtitle">Treatments</p>
		</header>

		<section class="card">
			<h2>PrescribeIT (Canada)</h2>
			<p style="margin-bottom: 1.5rem; color: var(--text-secondary); font-size: 0.95rem;">
				The Canadian Clinical Drug Data Set (CCDD) and PrescribeIT terminology for prescribing and dispensing in Canada.
			</p>
			
			<div id="prescribeit-loader-container" style="text-align: center; margin-top: 2rem;">
				<button id="load-prescribeit-btn" class="action-btn">Load PrescribeIT Database (11.4 MB)</button>
				
				<div id="prescribeit-progress-container" style="display: none; width: 100%; margin-top: 1.5rem;">
					<p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;" id="prescribeit-progress-text">Downloading database...</p>
					<div style="width: 100%; height: 8px; background: var(--card-border); border-radius: 4px; overflow: hidden;">
						<div id="prescribeit-progress-bar" style="width: 0%; height: 100%; background: var(--accent); transition: width 0.2s ease;"></div>
					</div>
				</div>
			</div>

			<div id="prescribeit-search-container" style="display: none; margin-top: 2rem;">
				<div class="search-container" style="margin-bottom: 1.5rem;">
					<input type="text" id="prescribeit-search" placeholder="Search drug name, DIN, or description..." autocomplete="off">
				</div>
				<div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">
					Showing top <span id="prescribeit-result-count">0</span> results.
				</div>
				<div id="prescribeit-results" class="link-list" style="max-height: 500px; overflow-y: auto; padding-right: 10px;">
					<!-- Results will be injected here -->
				</div>
			</div>
		</section>

		
	</main>
	<script src="js/router.js"></script>
	<script src="js/treatments.js"></script>
</body>

</html>
